name: Version and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - CHANGELOG.md

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Update CHANGELOG
        if: steps.tag.outputs.new_tag != ''
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          DATE=$(date +%Y-%m-%d)
          CHANGES=$(cat << 'CHANGES_EOF'
          ${{ steps.tag.outputs.changelog }}
          CHANGES_EOF
          )

          if [ ! -f CHANGELOG.md ]; then
            printf "# Changelog\n\nAll notable changes to this project will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/) and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n" > CHANGELOG.md
          fi

          TEMP=$(mktemp)
          head -5 CHANGELOG.md > "$TEMP"
          printf "\n## [%s] - %s\n\n%s\n" "${TAG}" "${DATE}" "${CHANGES}" >> "$TEMP"
          tail -n +6 CHANGELOG.md >> "$TEMP"
          mv "$TEMP" CHANGELOG.md

      - name: Commit CHANGELOG
        if: steps.tag.outputs.new_tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG for ${{ steps.tag.outputs.new_tag }} [skip ci]"
          git push

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generate_release_notes: true
