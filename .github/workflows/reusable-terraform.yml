name: Reusable Terraform Workflow

on:
  workflow_call:
    inputs:
      stage:
        description: Stage to deploy — landing-zone or application
        required: true
        type: string
      factory_repository:
        description: Factory repository in owner/repo format (e.g. my-org/terraform-factory)
        required: true
        type: string
      factory_ref:
        description: Factory git tag to use for stages and modules (e.g. v1.2.0)
        required: true
        type: string
      config_path:
        description: Path to the JSON config file in the consumer repo
        required: false
        type: string
        default: config.json
      terraform_version:
        description: Terraform CLI version
        required: false
        type: string
        default: "1.9.0"
      checkov_skip_checks:
        description: Comma-separated Checkov check IDs to skip
        required: false
        type: string
        default: ""
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      FACTORY_READ_TOKEN:
        required: false

jobs:
  setup:
    name: Setup (${{ inputs.stage }})
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.prepare.outputs.environment }}
      backend_rg: ${{ steps.prepare.outputs.backend_rg }}
      backend_sa: ${{ steps.prepare.outputs.backend_sa }}
      backend_container: ${{ steps.prepare.outputs.backend_container }}
      stage_key: ${{ steps.prepare.outputs.stage_key }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: consumer

      - name: Checkout factory repo at pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.factory_repository }}
          ref: ${{ inputs.factory_ref }}
          path: factory
          token: ${{ secrets.FACTORY_READ_TOKEN || github.token }}

      - name: Prepare stage workspace
        id: prepare
        shell: bash
        run: |
          STAGE="${{ inputs.stage }}"
          CONFIG="consumer/${{ inputs.config_path }}"
          CONFIG_KEY="${STAGE//-/_}"
          STAGEDIR="factory/stages/${STAGE}"

          if [ ! -f "$CONFIG" ]; then
            echo "Config file not found: $CONFIG"
            exit 1
          fi

          ENV=$(jq -r '.environment' "$CONFIG")
          BACKEND_RG=$(jq -r '.backend.resource_group_name' "$CONFIG")
          BACKEND_SA=$(jq -r '.backend.storage_account_name' "$CONFIG")
          BACKEND_CONTAINER=$(jq -r '.backend.container_name' "$CONFIG")
          STAGE_KEY=$(jq -r ".backend.${CONFIG_KEY}_state_key" "$CONFIG")

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "backend_rg=$BACKEND_RG" >> "$GITHUB_OUTPUT"
          echo "backend_sa=$BACKEND_SA" >> "$GITHUB_OUTPUT"
          echo "backend_container=$BACKEND_CONTAINER" >> "$GITHUB_OUTPUT"
          echo "stage_key=$STAGE_KEY" >> "$GITHUB_OUTPUT"

          CUSTOM_DIR="consumer/custom/${STAGE}"
          if [ -d "$CUSTOM_DIR" ]; then
            echo "Merging custom Terraform files from $CUSTOM_DIR"
            find "$CUSTOM_DIR" -maxdepth 1 -name '*.tf' -exec cp {} "$STAGEDIR/" \;
          fi

          if [ "$STAGE" = "application" ]; then
            jq -n \
              --argjson stage "$(jq ".${CONFIG_KEY}" "$CONFIG")" \
              --argjson backend "$(jq '.backend' "$CONFIG")" \
              --arg env "$ENV" \
              '$stage + {
                environment: $env,
                state_backend_resource_group_name: $backend.resource_group_name,
                state_backend_storage_account_name: $backend.storage_account_name,
                state_backend_container_name: $backend.container_name,
                landing_zone_state_key: $backend.landing_zone_state_key
              }' > "$STAGEDIR/terraform.auto.tfvars.json"
          else
            jq -n \
              --argjson stage "$(jq ".${CONFIG_KEY}" "$CONFIG")" \
              --arg env "$ENV" \
              '$stage + {environment: $env}' > "$STAGEDIR/terraform.auto.tfvars.json"
          fi

      - name: Package stage workspace
        run: tar -czf stage-workspace.tar.gz -C "factory/stages/${{ inputs.stage }}" .

      - name: Upload stage workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-workspace-${{ inputs.stage }}-${{ github.run_id }}
          path: stage-workspace.tar.gz
          retention-days: 1

  security-scan:
    name: Security Scan (${{ inputs.stage }})
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download stage workspace
        uses: actions/download-artifact@v4
        with:
          name: stage-workspace-${{ inputs.stage }}-${{ github.run_id }}

      - name: Extract stage workspace
        run: |
          mkdir -p workspace
          tar -xzf stage-workspace.tar.gz -C workspace

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: workspace
          framework: terraform
          skip_check: ${{ inputs.checkov_skip_checks }}
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          download_external_modules: true
          soft_fail: false

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov-${{ inputs.stage }}

  plan:
    name: Terraform Plan (${{ inputs.stage }})
    runs-on: ubuntu-latest
    needs: [setup, security-scan]
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Download stage workspace
        uses: actions/download-artifact@v4
        with:
          name: stage-workspace-${{ inputs.stage }}-${{ github.run_id }}

      - name: Extract stage workspace
        run: |
          mkdir -p workspace
          tar -xzf stage-workspace.tar.gz -C workspace

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: workspace
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ needs.setup.outputs.backend_rg }}" \
            -backend-config="storage_account_name=${{ needs.setup.outputs.backend_sa }}" \
            -backend-config="container_name=${{ needs.setup.outputs.backend_container }}" \
            -backend-config="key=${{ needs.setup.outputs.stage_key }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform Validate
        working-directory: workspace
        run: terraform validate

      - name: Terraform Plan
        id: plan
        shell: bash
        working-directory: workspace
        continue-on-error: true
        run: |
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Publish Plan to Step Summary
        if: always()
        run: |
          echo "## Terraform Plan — ${{ inputs.stage }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          cat workspace/plan-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Plan Artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.stage }}-tfplan-${{ github.run_id }}
          path: workspace/tfplan
          retention-days: 7

      - name: Fail on Plan Error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan exited with errors. Review the plan output above."
          exit 1

  apply:
    name: Terraform Apply (${{ inputs.stage }})
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: needs.plan.outputs.plan_exit_code == '2'
    environment: ${{ needs.setup.outputs.environment }}-apply
    steps:
      - name: Download stage workspace
        uses: actions/download-artifact@v4
        with:
          name: stage-workspace-${{ inputs.stage }}-${{ github.run_id }}

      - name: Extract stage workspace
        run: |
          mkdir -p workspace
          tar -xzf stage-workspace.tar.gz -C workspace

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: workspace
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ needs.setup.outputs.backend_rg }}" \
            -backend-config="storage_account_name=${{ needs.setup.outputs.backend_sa }}" \
            -backend-config="container_name=${{ needs.setup.outputs.backend_container }}" \
            -backend-config="key=${{ needs.setup.outputs.stage_key }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.stage }}-tfplan-${{ github.run_id }}
          path: workspace

      - name: Terraform Apply
        working-directory: workspace
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
