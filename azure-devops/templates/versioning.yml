# Versioning pipeline — Azure DevOps equivalent of versioning.yml (GitHub Actions)
#
# Runs on every merge to main (excluding CHANGELOG.md updates).
# Parses conventional commit messages since the last tag, bumps the version,
# updates CHANGELOG.md using git-cliff, commits, pushes the tag, and creates
# an Azure DevOps release.
#
# Setup required:
#   1. Allow the pipeline's Build Service account to push to the repository:
#      Project Settings → Repositories → Security → {Project} Build Service
#      → Contribute: Allow, Create Tag: Allow
#   2. In the pipeline settings, enable "Allow scripts to access the OAuth token"
#      (Pipelines → Edit → ... → Triggers → YAML → Get sources → ☑ Allow scripts
#       to access the OAuth token), OR pass $(System.AccessToken) explicitly as
#       shown below.
#
# Commit format (mirrors GitHub Actions versioning.yml):
#   fix:      → patch bump   (x.x.+1)
#   feat:     → minor bump   (x.+1.0)
#   feat!: or BREAKING CHANGE: → major bump (+1.0.0)
#   chore: / docs: / ci:    → patch bump

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - CHANGELOG.md

pr: none

pool:
  vmImage: ubuntu-latest

jobs:
  - job: release
    displayName: Create Release
    steps:
      - checkout: self
        fetchDepth: 0
        persistCredentials: true
        displayName: Checkout (full history)

      - bash: |
          set -euo pipefail

          git fetch --tags --force

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          CURRENT_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Collect commit subjects since the last tag.
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "No commits since $LATEST_TAG — nothing to release."
            echo "##vso[task.setvariable variable=newTag]"
            exit 0
          fi

          BUMP="patch"
          while IFS= read -r commit; do
            # Breaking change: feat!:, fix!:, or BREAKING CHANGE in body
            if echo "$commit" | grep -qiE '(BREAKING[[:space:]]CHANGE|^(feat|fix|refactor|perf|style|test|docs|chore|ci|build)(\(.+\))?!)'; then
              BUMP="major"
              break
            fi
            # New feature
            if echo "$commit" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            fi
          done <<< "$COMMITS"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: $BUMP  →  $LATEST_TAG → $NEW_TAG"
          echo "##vso[task.setvariable variable=newTag]$NEW_TAG"
        displayName: Calculate next version

      - bash: |
          set -euo pipefail

          if [ -z "$NEW_TAG" ]; then
            echo "No new tag calculated — skipping."
            exit 0
          fi

          # Install git-cliff (same version used in the GitHub Actions workflow).
          GC_VERSION="2.4.0"
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --strip-components=1 -C /tmp \
                "git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu/git-cliff"
          sudo mv /tmp/git-cliff /usr/local/bin/git-cliff
          git-cliff --version
        displayName: Install git-cliff
        env:
          NEW_TAG: $(newTag)

      - bash: |
          set -euo pipefail

          if [ -z "$NEW_TAG" ]; then
            echo "No new tag — skipping CHANGELOG update."
            exit 0
          fi

          git-cliff --config cliff.toml --tag "$NEW_TAG" --output CHANGELOG.md
          echo "CHANGELOG.md updated for $NEW_TAG"
        displayName: Update CHANGELOG
        env:
          NEW_TAG: $(newTag)

      - bash: |
          set -euo pipefail

          if [ -z "$NEW_TAG" ]; then
            echo "No new tag — nothing to commit or push."
            exit 0
          fi

          git config user.email "azure-pipelines[bot]@users.noreply.dev.azure.com"
          git config user.name "Azure Pipelines"

          git add CHANGELOG.md
          git diff --staged --quiet \
            || git commit -m "chore: update CHANGELOG for ${NEW_TAG} [skip ci]"

          git tag "$NEW_TAG" -m "Release ${NEW_TAG}"

          # Push using the pipeline OAuth token.
          # Requires "Contribute" and "Create Tag" permissions for the Build Service account.
          B64_TOKEN=$(printf ":%s" "$SYSTEM_ACCESSTOKEN" | base64 | tr -d '\n')
          git -c "http.extraHeader=Authorization: Basic ${B64_TOKEN}" push origin HEAD:main
          git -c "http.extraHeader=Authorization: Basic ${B64_TOKEN}" push origin "$NEW_TAG"

          echo "##[section]Released $NEW_TAG"
        displayName: Commit, tag, and push
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)
          NEW_TAG: $(newTag)

      - bash: |
          set -euo pipefail

          if [ -z "$NEW_TAG" ]; then
            exit 0
          fi

          # Extract the latest section from CHANGELOG.md as the release description.
          # Grabs everything between the first and second "## [" headings.
          NOTES=$(awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md)

          # Create an Azure DevOps release via the REST API.
          # Requires a personal access token with "Release: Read & write" scope stored
          # as a pipeline secret variable named AZURE_DEVOPS_PAT, OR use the OAuth token
          # if the pipeline has sufficient permissions.
          #
          # If you prefer GitHub releases (factory repo on GitHub), use the GitHub CLI:
          #   gh release create "$NEW_TAG" --title "Release $NEW_TAG" --notes "$NOTES"

          echo "Tag $NEW_TAG pushed. Create a release in Azure DevOps Pipelines → Releases"
          echo "or configure the GitHub CLI step above if the factory is on GitHub."
          echo ""
          echo "Release notes preview:"
          echo "$NOTES"
        displayName: Release notes
        env:
          NEW_TAG: $(newTag)
